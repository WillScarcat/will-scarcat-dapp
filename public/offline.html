<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Will Scarcat — Offline</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0a0a0a;
      color: #fff;
      font-family: 'Courier New', Courier, monospace;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }
    .logo {
      width: 80px;
      height: 80px;
      object-fit: cover;
      border: 2px solid #CCFF00;
      margin-bottom: 2rem;
    }
    .badge {
      font-size: 9px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: #666;
      border: 1px solid #2a2a2a;
      padding: 2px 8px;
      margin-bottom: 1.5rem;
    }
    h1 {
      font-size: 1.25rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 0.75rem;
    }
    p {
      font-size: 0.75rem;
      color: #666;
      max-width: 280px;
      line-height: 1.7;
      margin-bottom: 2rem;
    }
    .accent { color: #CCFF00; }
    .btn {
      display: inline-block;
      background: #CCFF00;
      color: #000;
      font-family: 'Courier New', Courier, monospace;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      padding: 12px 28px;
      text-decoration: none;
      cursor: pointer;
      border: none;
    }
    .btn:hover { background: #b8e600; }
  </style>
</head>
<body>
  <img src="/images/willlogo.jpg" alt="Will Scarcat" class="logo" />
  <div class="badge">Will Scarcat · Robinhood Chain</div>
  <h1>You're <span class="accent">Offline</span></h1>
  <p>Connect to the internet to claim your cat rewards and check live stats.</p>
  <button class="btn" onclick="location.reload()">Try Again</button>
</body>
</html>
